<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cupcode | Gestión de Liga Hockey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#dee1ff",
                    "surface-container-low": "#181b2a",
                    "surface-tint": "#ffb4a9",
                    "inverse-surface": "#e0e1f7",
                    "error": "#ffb4ab",
                    "on-primary": "#690002",
                    "on-error-container": "#ffdad6",
                    "surface-variant": "#313444",
                    "secondary-container": "#44485d",
                    "on-tertiary": "#282e4e",
                    "error-container": "#93000a",
                    "secondary": "#c2c5de",
                    "secondary-fixed": "#dee1fb",
                    "surface-container-highest": "#313444",
                    "surface-dim": "#0f1221",
                    "primary-container": "#ff5544",
                    "on-primary-fixed": "#410001",
                    "on-primary-fixed-variant": "#930004",
                    "tertiary-container": "#898fb4",
                    "on-tertiary-fixed-variant": "#3f4566",
                    "on-surface": "#e0e1f7",
                    "surface-container-high": "#262939",
                    "on-secondary-fixed": "#161b2d",
                    "primary": "#ffb4a9",
                    "primary-fixed": "#ffdad5",
                    "on-tertiary-fixed": "#131938",
                    "on-secondary-fixed-variant": "#42465a",
                    "tertiary-fixed-dim": "#bfc4ec",
                    "on-primary-container": "#5c0001",
                    "background": "#0f1221",
                    "outline-variant": "#5c403c",
                    "surface-container": "#1c1f2e",
                    "secondary-fixed-dim": "#c2c5de",
                    "on-surface-variant": "#e5bdb7",
                    "surface": "#0f1221",
                    "surface-container-lowest": "#0a0d1c",
                    "on-error": "#690005",
                    "inverse-primary": "#bd110e",
                    "on-tertiary-container": "#222847",
                    "on-secondary": "#2b2f43",
                    "on-background": "#e0e1f7",
                    "on-secondary-container": "#b4b7d0",
                    "tertiary": "#bfc4ec",
                    "inverse-on-surface": "#2d3040",
                    "outline": "#ac8883",
                    "surface-bright": "#353849",
                    "primary-fixed-dim": "#ffb4a9"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .condensed-header {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.04em;
        }
        .tracking-ultra-wide {
            letter-spacing: 0.25em;
        }
        .diagonal-text {
            transform: rotate(-15deg);
        }
    </style>
</head>
<body class="bg-surface-dim text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<main class="relative min-h-screen flex flex-col md:flex-row overflow-hidden">
<!-- Left Panel (Login Form) -->
<section class="relative z-10 w-full md:w-[40%] bg-surface-container-low flex flex-col justify-between px-8 py-12 md:px-16 md:py-16 shadow-[20px_0px_40px_rgba(10,13,28,0.5)]">
<!-- Branding Section -->
<header class="flex flex-col items-center mb-12">
<div class="flex items-center gap-2 mb-2">
<span class="text-3xl font-black condensed-header text-primary">CUPCODE</span>
</div>
<span class="text-[10px] text-secondary font-semibold tracking-ultra-wide uppercase">GESTIÓN DE LIGA HOCKEY</span>
</header>
<!-- Form Content -->
<div class="w-full max-w-sm mx-auto">
<div class="mb-10 text-center">
<h1 class="text-2xl font-bold condensed-header uppercase text-on-surface mb-3">Iniciar Sesión</h1>
<div class="w-8 h-[3px] bg-primary-container mx-auto"></div>
</div>
<form class="space-y-6">
<!-- Field 1: Usuario -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-secondary block" for="username">Usuario</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none focus:ring-0 text-on-surface placeholder:text-slate-600 px-4 py-4 pr-12 transition-all duration-200 border-b-2 border-transparent focus:border-primary-container" id="username" name="username" placeholder="Ingresa tu usuario" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</div>
</div>
<!-- Field 2: Contraseña -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-secondary block" for="password">Contraseña</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none focus:ring-0 text-on-surface placeholder:text-slate-600 px-4 py-4 pr-12 transition-all duration-200 border-b-2 border-transparent focus:border-primary-container" id="password" name="password" placeholder="Ingresa tu contraseña" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[52px] bg-primary-container hover:bg-inverse-primary text-on-primary-container font-black condensed-header text-lg uppercase transition-all duration-200 active:scale-[0.98] flex items-center justify-center tracking-tight" type="submit">
                        INICIAR SESIÓN
                    </button>
<!-- Secondary Action -->
<button class="w-full py-3 border border-outline-variant/20 hover:border-primary-container text-secondary hover:text-on-surface text-xs font-bold uppercase tracking-widest transition-all duration-200" type="button">
                        Recuperar Contraseña
                    </button>
</form>
</div>
<!-- Footer Section -->
<footer class="mt-16 flex flex-col items-center gap-6">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-highest rounded-lg">
<span class="material-symbols-outlined text-primary text-sm" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Acceso Seguro</span>
</div>
<p class="text-[10px] uppercase tracking-widest text-slate-600">© Cupcode 2025</p>
</footer>
</section>
<!-- Panel Divider (Visual Splice) -->
<div class="hidden md:block w-[1px] bg-gradient-to-b from-primary-container via-transparent to-transparent opacity-30 h-full absolute left-[40%] z-20"></div>
<!-- Right Panel (Hero/Cinematic) -->
<section class="hidden md:block relative w-[60%] h-full overflow-hidden bg-surface-dim">
<!-- Background Image -->
<div class="absolute inset-0 grayscale contrast-125 brightness-50">
<img alt="Action scene" class="w-full h-full object-cover" data-alt="Cinematic grayscale shot of a professional hockey player in intense action on ice, dramatic lighting, dynamic motion blur, high contrast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZjhpoeO6cJArLWrUC7qROoJJ2jnALsEd5cksR-uTnIiAZBuPYBwBizSCUDk-p1TKnLI782rnYLEKKvzRsLoxPmTssfxldtlVIdzjiki9SbY0ycGSLr7iTP74qc1MRUuKkWfqJBFdlMaLPRNTGpOhxizj19aYSDe2RUfr04mqmkQ7RkiXOfyADYAT_0Ux_c_UxhnBuxDKrZ1EsNZxU98xjjKn1r5I3IYGHEsUaq1g2TkyY4sXIwfxEO__79ac3YUOxzTAyUBch2to"/>
</div>
<!-- Overlays -->
<div class="absolute inset-0 bg-primary-container/10 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-gradient-to-r from-surface-container-low via-transparent to-transparent"></div>
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_rgba(15,18,33,0.8)_100%)]"></div>
<!-- Creative Typography -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none select-none overflow-hidden">
<span class="diagonal-text text-[12vw] font-black condensed-header uppercase text-white opacity-[0.06] whitespace-nowrap leading-none tracking-tighter">
                    CUPCODE LEAGUE MANAGEMENT
                </span>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-16 right-16 flex flex-col items-end">
<div class="w-16 h-1 bg-primary-container mb-4"></div>
<span class="text-sm font-bold condensed-header uppercase text-primary tracking-widest">The Elite Tactical Edge</span>
</div>
</section>
<!-- Mobile Background Overlay (Only visible on small screens) -->
<div class="md:hidden absolute inset-0 z-0 opacity-10">
<img alt="Background" class="w-full h-full object-cover grayscale" data-alt="Abstract dark hockey rink atmosphere with ice textures and dramatic shadows, grayscale architectural perspective" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAX30McrWYedCGIHxFF-Yi0bHPR6mqKIEmByPBWqD4znizpaekR4zqjqKt5DNJ_lFEcRV8ov5qN3W1M_lmHCoK7KIZ7JXaQKBh8SXT7xJ-moae4LYFNQpSixTPeYnjior2RSlPA26Xkt1lmbaz6xTGDPNwyytkhfEUegYcdqVWMkLbhtTLvygSLkWFlwMrsOuRPbX06E_oXYfoBbu-SPbgotDqqlum06r6kRVao14m7FTGykk44rYzJ6oF2ao850_8_B8JsBWLNJU4"/>
</div>
</main>
<!-- Shared Component Shell Fallback Support (Hiding non-relevant shells for focus) -->
<style>
        /* Ensuring side/top navs are hidden as per the "Focused Journey" rule */
        .side-nav, .top-nav, .bottom-nav { display: none !important; }
    </style>
</body></html>
