<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupcode | Gestión de Liga Hockey</title>
    <!-- Google Fonts: Barlow Condensed & DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #141726;
            --bg-panel: #1E2235;
            --accent-red: #E63428;
            --text-primary: #FFFFFF;
            --text-secondary: #8B92A9;
            --border-deep: #2A3050;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        [data-theme="light"] {
            --bg-base: #F4F7FA;
            --bg-panel: #FFFFFF;
            --text-primary: #141726;
            --text-secondary: #5C637A;
            --border-deep: #D1D5E5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow: hidden;
            height: 100vh;
        }

        /* Split Screen Layout */
        .split-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Left Panel: Form (40%) */
        .left-panel {
            width: 40%;
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
            padding: 8rem 10% 4rem;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.4);
        }

        .branding {
            text-align: center;
            margin-bottom: 12px; /* Reducción a 12px para mayor cohesión visual */
        }

        .logo {
            height: 94px;
            /* 72px * 1.3 = ~94px (30% increase) */
            object-fit: contain;
            margin-bottom: 0;
            /* Espaciado eliminado para mayor integración */
        }

        [data-theme="light"] .logo {
            height: 72px; /* Altura específica para el logo horizontal en modo claro */
        }

        .form-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-header h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .form-header h1 span {
            color: var(--accent-red);
        }

        .form-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Form Controls */
        .login-form {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .input-group input {
            width: 100%;
            background-color: var(--bg-base);
            opacity: 0.8;
            border: 1px solid var(--border-deep);
            color: var(--text-primary);
            padding: 1rem 1.25rem;
            font-family: var(--font-body);
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: var(--border-deep);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s;
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            background-color: var(--accent-red);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-red);
            box-shadow: 0 0 15px rgba(230, 52, 40, 0.2);
            background-color: rgba(20, 23, 38, 0.9);
        }

        .btn-primary {
            width: 100%;
            height: 52px;
            background-color: var(--accent-red);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.25rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.05em;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(230, 52, 40, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 52, 40, 0.4);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .recovery-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        .recovery-link:hover {
            color: var(--accent-red);
        }

        /* Footer Left */
        .footer-left {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border-deep);
            color: rgba(139, 146, 169, 0.4);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .footer-links a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--accent-red);
        }

        /* Right Panel: Hero Slideshow (Animación) */
        .right-panel {
            width: 60%;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        .slideshow-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .hero-slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) brightness(0.6) contrast(1.1);
            opacity: 0;
            animation: cinematicFade 10s infinite ease-in-out;
        }

        .hero-slide:nth-child(2) {
            animation-delay: 5s;
            /* Mitad del ciclo */
        }

        @keyframes cinematicFade {
            0% {
                opacity: 0;
                transform: scale(1.05);
            }

            10% {
                opacity: 1;
            }

            45% {
                opacity: 1;
            }

            55% {
                opacity: 0;
                transform: scale(1);
            }

            100% {
                opacity: 0;
            }
        }

        /* Overlays on Right Panel */
        .hero-overlay-red {
            position: absolute;
            inset: 0;
            background-color: var(--accent-red);
            opacity: 0.1;
            mix-blend-mode: multiply;
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, #1E2235 0%, transparent 90%); /* Hardcoded dark color to prevent white filter in light mode */
        }

        /* Right Side Content */
        .right-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* Alineado a la parte inferior como se solicitó */
            padding: 10%;
            pointer-events: none;
        }

        .status-badge {
            position: absolute;
            top: 3rem;
            right: 3rem;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-left: 3px solid var(--accent-red);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #FFFFFF; /* Siempre blanco para contraste en el hero dark */
        }

        .technical-label {
            display: inline-block;
            background-color: var(--accent-red);
            color: #fff;
            padding: 0.25rem 0.75rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            width: fit-content;
        }

        .hero-phrase {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 5.5vw;
            line-height: 0.85;
            /* Reducido para mayor impacto visual */
            text-transform: uppercase;
            letter-spacing: -0.04em;
            max-width: 800px;
            color: #FFFFFF; /* Siempre blanco */
        }

        .hero-phrase span {
            color: var(--accent-red);
        }

        .metrics-bar {
            margin-top: 72px;
            /* Espaciado exacto solicitado por el usuario */
            display: flex;
            gap: 6rem;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
        }

        .metric-value {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.8rem;
            /* Aumentado como se solicitó */
            color: var(--accent-red);
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .metric-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Mobile Adaptability */
        @media (max-width: 1024px) {
            .left-panel {
                width: 50%;
            }

            .right-panel {
                width: 50%;
            }

            .hero-phrase {
                font-size: 4rem;
            }
        }

        @media (max-width: 768px) {
            .split-layout {
                flex-direction: column;
            }

            .right-panel {
                display: none;
            }

            .left-panel {
                width: 100%;
                height: 100vh;
                padding: 4rem 2rem;
                background-image: linear-gradient(rgba(30, 34, 53, 0.95), rgba(30, 34, 53, 0.95)), url('desinginspo/imglogin01.png');
                background-size: cover;
                background-position: center;
            }

            .form-header h1 {
                font-size: 2rem;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate {
            animation: fadeIn 0.8s ease forwards;
        }

        .delay-1 {
            animation-delay: 0.2s;
            opacity: 0;
        }

        .delay-2 {
            animation-delay: 0.4s;
            opacity: 0;
        }

        .delay-3 {
            animation-delay: 0.6s;
            opacity: 0;
        }
    </style>
</head>

<body>
    <main class="split-layout">
        <!-- Panel Izquierdo (Formulario) -->
        <section class="left-panel">
            <button class="theme-toggle" id="themeSwitcher" title="Cambiar Tema">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" class="sun-icon">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="17.78" x2="5.64" y2="16.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
            <header class="branding animate">
                <img src="desinginspo/logo cupcode v.png" alt="Cupcode Logo" class="logo" id="mainLogo">
            </header>

            <div class="login-container">
                <div class="form-header animate delay-1">
                    <h1>INICIAR <span>SESIÓN</span></h1>
                    <p>INICIA SESIÓN PARA GESTIONAR TU TORNEO</p>
                </div>

                <form class="login-form animate delay-2">
                    <div class="input-group">
                        <label for="user">Usuario</label>
                        <input type="text" id="user" placeholder="USUARIO" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="CONTRASEÑA" required>
                    </div>

                    <button type="submit" class="btn-primary">ENTRAR</button>
                    <a href="#" class="recovery-link">RECUPERAR CONTRASEÑA</a>
                </form>
            </div>

            <footer class="footer-left animate delay-3">
                <div>© CUPCODE 2026</div>
                <div class="footer-links">
                    <a href="#">COOKIES</a>
                    <a href="#">POLITICAS</a>
                </div>
            </footer>
        </section>

        <!-- Panel Derecho (Visual con Animación) -->
        <section class="right-panel">
            <div class="slideshow-container">
                <img src="desinginspo/imglogin01.png" alt="Hockey Action 1" class="hero-slide">
                <img src="desinginspo/imglogin02.png" alt="Hockey Action 2" class="hero-slide">
            </div>
            <div class="hero-overlay-red"></div>
            <div class="hero-gradient"></div>

            <div class="status-badge">
                HOCKEY LÍNEA · <span style="color: var(--accent-red)">TORNEO 2026/27</span>
            </div>

            <div class="right-content">
                <div class="technical-label">ORGANIZA. CONTROLA. COMPITE.</div>
                <h2 class="hero-phrase" style="margin-top: 0px;">
                    CADA PARTIDO<br>
                    EMPIEZA <span>AQUÍ.</span>
                </h2>

                <div class="metrics-bar">
                    <div class="metric-item">
                        <span class="metric-value">+500</span>
                        <span class="metric-label">PARTIDOS GESTIONADOS</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-value">+2.400</span>
                        <span class="metric-label">JUGADORES INSCRITOS</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const themeSwitcher = document.getElementById('themeSwitcher');
        const mainLogo = document.getElementById('mainLogo');
        const body = document.body;

        const LOGO_DARK = "desinginspo/logo cupcode v.png"; // Corregida ruta (eliminado typo)
        const LOGO_LIGHT = "desinginspo/logo cupcode h.png";

        themeSwitcher.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const isLight = currentTheme === 'light';

            // Toggle Theme Attribute
            body.setAttribute('data-theme', isLight ? 'dark' : 'light');

            // Toggle Logo Source
            mainLogo.src = isLight ? LOGO_DARK : LOGO_LIGHT;

            // Optional: Update icon or animate switcher
            console.log(`Tema cambiado a: ${isLight ? 'dark' : 'light'}`);
        });

        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Autenticación en proceso...');
        });
    </script>
</body>

</html>
